name = "nju-class"
main = "src/index.ts"
compatibility_date = "2026-07-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

# 静态前端（index.html + bootstrap）。非 /search/* 的请求由 Assets 直接服务。
assets = { directory = "./public", binding = "ASSETS" }

[route]
pattern = "xk.nju.at/*"
zone_name = "210023.xyz"

# 每天零点刷新一次数据。
# 数据未变时刷新会因内容哈希一致而整体跳过，不重写 D1。
[triggers]
crons = ["0 0 * * *"]

# D1 数据库：先 `wrangler d1 create nju-class`，把返回的 database_id 填到下面
[[d1_databases]]
binding = "DB"
database_name = "nju-class"
database_id = "13c5efcc-ce0f-4b36-8b93-cd93f53638bf"

[vars]
# 本地/测试时设为 "true" 可通过 GET /__refresh 手动触发刷新；生产建议设 "false"
ALLOW_MANUAL_REFRESH = "false"

# 密钥（不要写进文件，按需配置）：
#   wrangler secret put SEATABLE_API_TOKEN            # NJU Table base
#   wrangler secret put SEATABLE_FORK_API_TOKEN       # fork25 base
#   wrangler secret put SEATABLE_ASTRA_API_TOKEN      # ad-astra base
