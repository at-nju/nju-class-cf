<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJU选课助手</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">NJU选课助手</h1>
        <div class="text-center mb-4">
            <span>Created by carottx</span> |
            <a href="https://github.com/carottX/nju-class" target="_blank">项目主页</a> |
            欢迎通过<a href="mailto:xuzm0616@gmail.com">邮件</a>或者<a href="https://table.nju.edu.cn/external-apps/7aded834-74a2-43cc-b515-fb8e01656ef2/" target="_blank">NJUTable</a>添加更多红黑榜！
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label for="teacherName">按老师查找</label>
                    <input type="text" id="teacherName" class="form-control" placeholder="输入老师名字">
                    <button class="btn btn-primary mt-2" onclick="searchTeacher()">查找</button>
                </div>
                <div id="teacherResults"></div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label for="courseName">按课程查找</label>
                    <input type="text" id="courseName" class="form-control" placeholder="输入课程名字">
                    <button class="btn btn-primary mt-2" onclick="searchCourse()">查找</button>
                </div>
                <div id="courseResults"></div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('teacherName').addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    searchTeacher();
                }
            });
            document.getElementById('courseName').addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    searchCourse();
                }
            });
        });

        function showAlert(resultsDiv, type, text) {
            resultsDiv.innerHTML = '';
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = text;
            resultsDiv.appendChild(alert);
        }

        function showLoading(resultsDiv) {
            resultsDiv.innerHTML = '';
            const loading = document.createElement('div');
            loading.className = 'text-center text-muted my-3';
            loading.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> 搜索中…';
            resultsDiv.appendChild(loading);
        }

        function buildCard(item, sources, reviewText, isEmpty) {
            const card = document.createElement('div');
            card.className = 'card';
            const body = document.createElement('div');
            body.className = 'card-body';

            const title = document.createElement('h5');
            title.className = 'card-title';
            title.textContent = `${item.课程名称} - ${item.教师}`;

            const source = document.createElement('small');
            source.className = 'text-muted';
            source.textContent = `来源: ${sources}`;

            const review = document.createElement('p');
            review.className = isEmpty ? 'card-text text-muted' : 'card-text';
            review.textContent = reviewText;

            body.appendChild(title);
            body.appendChild(source);
            body.appendChild(review);
            card.appendChild(body);
            return card;
        }

        function renderResults(resultsDiv, data) {
            resultsDiv.innerHTML = '';
            if (data.error) {
                showAlert(resultsDiv, 'danger', data.error);
            } else if (data.message) {
                showAlert(resultsDiv, 'warning', data.message);
            } else {
                data.forEach(item => {
                    const reviews = Object.keys(item)
                        .filter(key => key.startsWith('评价'))
                        .map(key => item[key])
                        .filter(review => review);

                    const sources = item.来源 ? (Array.isArray(item.来源) ? item.来源.join(', ') : item.来源) : '未知来源';

                    if (reviews.length > 0) {
                        reviews.forEach(review => {
                            resultsDiv.appendChild(buildCard(item, sources, review, false));
                        });
                    } else {
                        resultsDiv.appendChild(buildCard(item, sources, '暂无评价', true));
                    }
                });
            }
        }

        function doSearch(endpoint, inputId, resultsId) {
            const name = document.getElementById(inputId).value;
            const resultsDiv = document.getElementById(resultsId);
            showLoading(resultsDiv);
            fetch(`/search/${endpoint}?name=${encodeURIComponent(name)}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`服务器错误 (${response.status})`);
                    }
                    return response.json();
                })
                .then(data => renderResults(resultsDiv, data))
                .catch(error => showAlert(resultsDiv, 'danger', `请求失败：${error.message}`));
        }

        function searchTeacher() {
            doSearch('teacher', 'teacherName', 'teacherResults');
        }

        function searchCourse() {
            doSearch('course', 'courseName', 'courseResults');
        }
    </script>
</body>
</html>
