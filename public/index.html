<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJU选课助手</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            margin-bottom: 20px;
        }
        .card-text {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">NJU选课助手</h1>
        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label for="teacherName">按老师查找</label>
                    <input type="text" id="teacherName" class="form-control" placeholder="输入老师名字">
                    <button class="btn btn-primary mt-2" onclick="searchTeacher()">查找</button>
                </div>
                <div id="teacherResults"></div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label for="courseName">按课程查找</label>
                    <input type="text" id="courseName" class="form-control" placeholder="输入课程名字">
                    <button class="btn btn-primary mt-2" onclick="searchCourse()">查找</button>
                </div>
                <div id="courseResults"></div>
            </div>
        </div>

        <footer class="mt-5 pt-4 border-top text-muted">
            <div class="row">
                <div class="col-md-6 mb-3" id="contribute">
                    <h5>投稿</h5>
                    <ul class="list-unstyled mb-0">
                        <li>通过 <a href="https://table.nju.edu.cn/apps/custom/red-black-fork25/" target="_blank">红黑榜-fork25</a> 投稿</li>
                        <li>通过 <a href="https://table.nju.edu.cn/apps/custom/ad-astra/" target="_blank">鼓励你学哪门课榜</a> 投稿</li>
                        <li>通过 <a href="mailto:admin@nju.at">admin@nju.at</a> 投稿</li>
                    </ul>
                </div>
                <div class="col-md-6 mb-3" id="about">
                    <h5>关于</h5>
                    <ul class="list-unstyled mb-0">
                        <li>本项目 <a href="https://github.com/at-nju/nju-class-cf" target="_blank">at-nju/nju-class-cf</a></li>
                        <li>原项目 <a href="https://github.com/carottX/nju-class" target="_blank">carottX/nju-class</a></li>
                        <li>以 <a href="https://github.com/at-nju/nju-class-cf/blob/main/LICENSE" target="_blank">GPL-3.0</a> 许可证发布</li>
                    </ul>
                </div>
            </div>
        </footer>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('teacherName').addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    searchTeacher();
                }
            });
            document.getElementById('courseName').addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    searchCourse();
                }
            });
        });

        function showAlert(resultsDiv, type, text) {
            resultsDiv.innerHTML = '';
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = text;
            resultsDiv.appendChild(alert);
        }

        function showLoading(resultsDiv) {
            resultsDiv.innerHTML = '';
            const loading = document.createElement('div');
            loading.className = 'text-center text-muted my-3';
            loading.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> 搜索中…';
            resultsDiv.appendChild(loading);
        }

        function buildCard(item, sources, reviewText, isEmpty) {
            const card = document.createElement('div');
            card.className = 'card';
            const body = document.createElement('div');
            body.className = 'card-body';

            const title = document.createElement('h5');
            title.className = 'card-title';
            title.textContent = `${item.course} - ${item.teacher}`;

            const source = document.createElement('small');
            source.className = 'text-muted';
            source.textContent = `来源: ${sources}`;

            const review = document.createElement('p');
            review.className = isEmpty ? 'card-text text-muted' : 'card-text';
            review.textContent = reviewText;

            body.appendChild(title);
            body.appendChild(source);
            body.appendChild(review);
            card.appendChild(body);
            return card;
        }

        function renderResults(resultsDiv, data) {
            resultsDiv.innerHTML = '';
            if (data.error) {
                showAlert(resultsDiv, 'danger', data.error);
            } else if (data.message) {
                showAlert(resultsDiv, 'warning', data.message);
            } else {
                data.forEach(item => {
                    const sources = Array.isArray(item.sources) && item.sources.length ? item.sources.join(', ') : '未知来源';
                    if (item.review) {
                        resultsDiv.appendChild(buildCard(item, sources, item.review, false));
                    } else {
                        resultsDiv.appendChild(buildCard(item, sources, '暂无评价', true));
                    }
                });
            }
        }

        function doSearch(endpoint, inputId, resultsId) {
            const name = document.getElementById(inputId).value;
            const resultsDiv = document.getElementById(resultsId);
            showLoading(resultsDiv);
            fetch(`/search/${endpoint}?name=${encodeURIComponent(name)}`)
                .then(response =>
                    // 无论状态码如何，都尝试解析 JSON，交给 renderResults 展示后端的 error/message；
                    // 仅当响应体不是 JSON 时，才退回到用状态码提示
                    response.json().catch(() => {
                        throw new Error(`服务器错误 (${response.status})`);
                    })
                )
                .then(data => renderResults(resultsDiv, data))
                .catch(error => showAlert(resultsDiv, 'danger', `请求失败：${error.message}`));
        }

        function searchTeacher() {
            doSearch('teacher', 'teacherName', 'teacherResults');
        }

        function searchCourse() {
            doSearch('course', 'courseName', 'courseResults');
        }
    </script>
</body>
</html>
